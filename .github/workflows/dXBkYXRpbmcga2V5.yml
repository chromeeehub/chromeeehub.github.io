name: Update key

on:
  schedule:

    - cron: '15 2,14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ganti Link di Index
        run: |
          sed -i 's|href="https://sfl.gl/[^"]*"|href="https://sfl.gl/xAi61DS"|g' index.html

      - name: Commit & Push
        run: |
          git config --global user.name "Chromeee Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Auto Update Link Key: $(date)" || echo "Tidak ada perubahan"
          git push
