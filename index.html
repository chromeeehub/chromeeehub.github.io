<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chromeee Hub | Scripts</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0a0a0c;
            --card-bg: #16161a;
            --accent-color: #00f2ff; /* Neon Blue */
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            right: 0;
            padding: 25px 5%;
            display: flex;
            gap: 30px;
            background: linear-gradient(to bottom, var(--bg-color), transparent);
            z-index: 100;
        }

        nav a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        nav a:hover, nav span:hover {
            color: var(--accent-color);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .brand {
            position: fixed;
            top: 25px;
            left: 5%;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        /* Main Content */
        .container {
            max-width: 800px;
            margin: 120px auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Script Box */
        .script-card {
            background: var(--card-bg);
            border: 1px solid #2d2d35;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            text-align: left;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .script-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .script-title::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent-color);
        }

        .code-box {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: #d1d1d1;
            border: 1px solid #1e1e24;
            position: relative;
            margin-bottom: 15px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .btn-copy {
            background: var(--accent-color);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            text-transform: uppercase;
        }

        .btn-copy:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px var(--accent-glow);
        }

        /* Key Section */
        .key-section {
            background: rgba(0, 242, 255, 0.03);
            border: 1px dashed var(--accent-color);
            border-radius: 12px;
            padding: 25px;
            margin-top: 30px;
        }

        .timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            color: var(--accent-color);
            margin: 10px 0;
            font-weight: 700;
        }

        .btn-key {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 30px;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-key:hover {
            background: var(--accent-color);
            color: #000;
        }

        /* Social Links */
        .social-footer {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .btn-wa {
            background: #25D366;
            color: white;
            padding: 12px 25px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
        }

        .btn-wa:hover { opacity: 0.9; transform: scale(1.05); }

        @media (max-width: 600px) {
            nav { gap: 15px; width: 100%; justify-content: center; }
            .brand { display: none; }
        }
    </style>
</head>
<body>

    <div class="brand">Chromeee Hub</div>

    <nav>
        <a href="#scripts">Scripts</a>
        <a href="#about">About</a>
        <a href="https://tiktok.com/@chromeeehub" target="_blank">TikTok</a>
    </nav>

    <div class="container">
        <section id="scripts">
            <h1>Script Repository</h1>

            <div class="script-card">
                <div class="script-title">Kurir MBG Script</div>
                <div class="code-box" id="scriptText">
                    loadstring(game:HttpGet("https://chromeeehub.github.io/kurirmbg.txt"))()
                </div>
                <button class="btn-copy" onclick="copyScript()">
                    <i class="fas fa-copy"></i> Copy Script
                </button>
            </div>

            <div class="key-section">
                <div style="color: var(--text-dim); font-size: 0.9rem; font-weight: 600;">KEY SYSTEM STATUS: ACTIVE</div>
                <div class="timer" id="countdown">00:00:00</div>
                <p style="font-size: 0.8rem; color: var(--text-dim);">Key reset setiap 12 jam (9 AM/PM) WIB</p>
                <a href="https://sfl.gl/UDeN0" class="btn-key" target="_blank">GET NEW KEY</a>
            </div>
        </section>

<section id="about" style="margin-top: 80px;">
            <p style="color: var(--text-dim);">
                Gw bikin script cuma gabut doang.
            </p>
            
            <div style="margin-top: 25px;">
                <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fchromeeehub.github.io&count_bg=%2300F2FF&title_bg=%2316161A&title=TOTAL+VIEWS&edge_flat=true" alt="Visitor Count" style="border-radius: 4px; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2);">
            </div>
        </section>

        <div class="social-footer">
            <a href="https://www.whatsapp.com/channel/0029Vb7i9Td60eBW06WKXi2i" class="btn-wa" target="_blank">
                <i class="fab fa-whatsapp"></i> Join WhatsApp Channel
            </a>
        </div>
    </div>

    <script>
        // Fungsi Copy Script
        function copyScript() {
            const text = document.getElementById('scriptText').innerText;
            navigator.clipboard.writeText(text).then(() => {
                const btn = document.querySelector('.btn-copy');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                btn.style.background = '#00ff88';
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.style.background = '#00f2ff';
                }, 2000);
            });
        }

        // Fungsi Countdown 12 Jam (Loop 10 AM & 10 PM)
        function updateCountdown() {
            const now = new Date();
            let target = new Date();
            
            const currentHour = now.getHours();

            if (currentHour < 9) {
                // Jika masih sebelum jam 10 pagi, targetnya jam 10 pagi ini
                target.setHours(9, 0, 0, 0);
            } else if (currentHour < 21) {
                // Jika antara jam 10 pagi dan sebelum jam 10 malam, targetnya jam 10 malam ini
                target.setHours(21, 0, 0, 0);
            } else {
                // Jika sudah lewat jam 10 malam, targetnya jam 10 pagi BESOK
                target.setHours(9, 0, 0, 0);
                target.setDate(target.getDate() + 1); // Tambah 1 hari
            }

            const diff = target - now;

            const h = Math.floor(diff / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById('countdown').innerHTML = 
                (h < 10 ? '0' + h : h) + ":" + 
                (m < 10 ? '0' + m : m) + ":" + 
                (s < 10 ? '0' + s : s);
        }

        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>

</body>
</html>
